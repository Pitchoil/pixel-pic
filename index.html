<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pixel-Pic</title>

    <link rel="stylesheet" href="styles.css">

    <!-- App / favicon icons (pixelated Pac-Man) -->
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111122">
</head>
<body>
    <header>
        <img class="logo" src="assets/icons/icon-192.png" alt="Pixel-Pic logo" width="40" height="40">
        <h1>Pixel-Pic</h1>
    </header>
    <p class="subtitle">Turn any photo into a polished, enhanced profile pic</p>

    <input id="fileInput" type="file" accept="image/*" hidden>
    <div class="btn-row">
        <button id="pickBtn">📸 Pick Image</button>
        <button id="resetBtn" disabled>↺ Reset</button>
    </div>

    <div class="preview-wrap">
        <canvas id="preview" width="320" height="320"></canvas>
        <p id="status" class="status"></p>
    </div>

    <section id="controls" class="controls" hidden>
        <div class="shape-toggle">
            <button id="shapeSquare" class="shape-btn active" data-shape="square">▢ Square</button>
            <button id="shapeCircle" class="shape-btn" data-shape="circle">◯ Circle</button>
        </div>

        <button id="autoBtn">✨ Auto Enhance</button>

        <label>Brightness
            <input id="brightness" type="range" min="50" max="150" value="100">
        </label>
        <label>Contrast
            <input id="contrast" type="range" min="50" max="150" value="100">
        </label>
        <label>Saturation
            <input id="saturation" type="range" min="0" max="200" value="100">
        </label>
        <label>Sharpen
            <input id="sharpen" type="range" min="0" max="100" value="0">
        </label>
    </section>

    <div class="btn-row">
        <button id="saveBtn" disabled>💾 Save PNG</button>
        <button id="shareBtn" disabled>↗️ Share</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
